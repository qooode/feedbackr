version: "3.8"

services:
  feedbackr:
    build:
      context: .
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-}
        VITE_LOGO_URL: ${VITE_LOGO_URL:-}
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      # ── Required ──────────────────────────────────────
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # ── PocketBase Superuser (auto-created on first boot) ──
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD}

      # ── Admin Users (auto-promoted on login) ──────────
      # Comma-separated list of emails that get is_admin=true
      - ADMIN_EMAILS=${ADMIN_EMAILS}

      # ── Optional ──────────────────────────────────────
      # AI model to use (default: anthropic/claude-sonnet-4)
      - AI_MODEL=${AI_MODEL:-anthropic/claude-sonnet-4}
      # Your app URL (used as OpenRouter referer)
      - APP_URL=${APP_URL:-http://localhost:8090}

      # ── Rate Limiting (optional) ────────────────────
      - RATE_WINDOW_SEC=${RATE_WINDOW_SEC:-60}
      - RATE_MAX_AI=${RATE_MAX_AI:-15}
      - RATE_MAX_CREATE=${RATE_MAX_CREATE:-20}

      # ── Custom Branding (optional) ─────────────────────
      # Custom name shown in navbar & browser tab (default: feedbackr)
      - VITE_APP_NAME=${VITE_APP_NAME:-}
      # URL to a custom logo image (PNG/SVG); leave empty for default icon
      - VITE_LOGO_URL=${VITE_LOGO_URL:-}

      # ── Media Upload (optional) ──────────────────────
      # Catbox.moe userhash for server-side file upload proxy
      - CATBOX_USERHASH=${CATBOX_USERHASH:-}

      # ── Discord OAuth (optional) ──────────────────────
      # Configure in PocketBase admin UI after first boot
      # - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      # - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
    restart: unless-stopped

volumes:
  pb_data:
